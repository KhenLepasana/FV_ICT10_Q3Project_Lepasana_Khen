<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List of Players</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: #0f2027;
        }

        .navbar a {
            color: white !important;
            font-weight: bold;
            margin-left: 15px;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 15px;
        }

        .card-box {
            background: white;
            padding: 40px;
            width: 700px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        #playerList {
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: left;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="teamchecker.html">
            🏆 Intramurals 2026
        </a>
        <div>
            <a href="index.html">Sign Up</a>
            <a href="teamchecker.html">Team Checker</a>
            <a href="lop.html">Players</a>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main-container">
    <div class="card-box text-center">

        <h3 class="mb-4 fw-bold">List of Players</h3>

        <!-- TABS -->
        <ul class="nav nav-tabs justify-content-center mb-3">
            <li class="nav-item">
                <button class="nav-link active" py-click="show_yellow">Yellow Tigers</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" py-click="show_red">Red Bulldogs</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" py-click="show_blue">Blue Bears</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" py-click="show_green">Green Hornets</button>
            </li>
        </ul>

        <!-- PLAYER OUTPUT -->
        <div id="playerList"></div>

    </div>
</div>

<script type="py" src="lop.py"></script>

</body>
</html>
