<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intramurals Sign Up</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141E30, #243B55);
            font-family: 'Segoe UI', sans-serif;
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            width: 400px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            color: white;
            text-align: center;
        }

        .signup-card h2 {
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 12px;
            border: none;
            padding: 12px;
        }

        .form-control:focus {
            box-shadow: 0 0 10px rgba(0,123,255,0.8);
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }

        .title-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
 <!-- Signup Card Container -->
    <div class="signup-card">
        <div class="title-icon">🏆</div>
        <h2>Intramurals 2026</h2>
        <p>Create Your Account</p>
  <!-- Username input field -->
        <input type="text" id="username" class="form-control mb-3" placeholder="Enter Username">
  <!-- Password input field -->
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password">

        <button class="btn btn-custom w-100" py-click="register_user">
            Sign Up
        </button>

        <div id="message"></div>
    </div>

    <script type="py" src="main.py"></script>

</body>
</html>
